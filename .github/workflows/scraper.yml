name: Phone Scraper

on:
  schedule:
    - cron: "*/10 * * * *"   # প্রতি ১০ মিনিটে রান হবে
  workflow_dispatch:          # চাইলে ম্যানুয়ালি চালানো যাবে

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node scraper.js
