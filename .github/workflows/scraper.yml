name: Phone Scraper

on:
  schedule:
    - cron: "*/10 * * * *"   # প্রতি ১০ মিনিটে রান হবে
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"   # ✅ Node.js 20 ব্যবহার করো

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scraper.js
